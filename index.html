<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Email_spam</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <div class="card">

    <!-- Dark Mode -->
    <div class="top-bar">
        <button id="theme-toggle" class="btn">
            🌙
        </button>
    </div>


    <h1>Email Spam Detection</h1>

    <p class="subtitle">
        Classify emails using Machine Learning
    </p>

    <textarea
    id="email"
    rows="10"></textarea>

    <button class="btn1">
        <i class="fa-solid fa-magnifying-glass"></i>
        Detect Spam
    </button>

    <div class="prediction-card">

        <h2>Prediction</h2>

        <p class="result">

            <span class="safe">
                Not Spam ✅
            </span>

        </p>

        <div class="confidence">

            Confidence

            <div class="progress">

                <div class="progress-bar"></div>

            </div>

            <span>98.34%</span>

        </div>

    </div>

    <div class="info">

        <div class="box">

            <h3>🧠 Model</h3>

            <p>Multinomial Naive Bayes</p>

        </div>

        <div class="box">

            <h3>📈 Accuracy</h3>

            <p>98.2%</p>

        </div>

    </div>

</div>
<script src="script.js"></script>
</body>
</html>
